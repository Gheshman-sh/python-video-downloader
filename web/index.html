  <title>Video Downloader</title>

<body class="light">
  <header>
    <div class="logo">
      <h1>Video Downloader</h1>
    </div>
    <button class="toggle-theme">
      <img src="./images/sun.svg" alt="toggle-theme" class="ico">
    </button>
  </header>
  <main>
    <section>
      <div class="input">
        <input type="text" id="Url" placeholder="Paste your urls">
        <button id="paste">
          <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADAAAAAwCAYAAABXAvmHAAAACXBIWXMAAAsTAAALEwEAmpwYAAABMElEQVR4nO2Z0UoDMRBFL1jTFvq51gpKaX9Ln9R+g1K7f+KWkYURhsVNdydDu5V7YJ42yUyyJy8TgJBRMAGwBFABOAKQjjjqmDudMwpuALxkiu6KZ517cR4cxf/GEiPgs1XQbWZs8+3ejP84V5FzAFv1t86c6KLHWovM/FpzbDRnWPG7nkqsAKTMWmmAcjsAs4gNbAscL411xAaqE443p/TmKO71jxNu35GviA1Y57v0mAJ40oTfmaKbb3sAj5m1UutOFGMLOBcSmZMbcCD8AwYq5ECokIEKORAqZKBCDoQKGaiQA6FCBirkQKiQgQo5ECpkoEIOhAr9J4XqHq3FSFJ0a7Ea0D4vJbXa7yHN3c21t9fnAx44IuM96oEDulBzGocTT0ylUWuOdWTxhBCMlx9azJWx7jRFxQAAAABJRU5ErkJggg==" class="ico">
        </button>
      </div>
      <button id="proceed">Proceed</button>
    </section>
    <section>
      <div class="container video">

        <!-- thumbnail image -->
        <div class="thumbnail">
          <img src="" alt="" id="thumbnail_img">
        </div>

        <!-- details  -->
        <div class="details">
          <p class="title"></p>
          <div class="tags">
            <div class="tag author"></div>
            <div class="tag views"></div>
            <div class="tag likes"></div>
            <div class="tag dislikes"></div>
          </div>

          <!-- download buttons  -->
          <div class="download-btn">
            <button class="download" onclick="download('480', 'mp4')">480p | mp4</button>
            <button class="download" onclick="download('720', 'mp4')">720p | mp4</button>
            <button class="download" onclick="download('1080', 'mp4')">1080p | mp4</button>
            <button class="download" onclick="download('480', 'webm')">480p | webm</button>
            <button class="download" onclick="download('720', 'webm')">720p | webm</button>
            <button class="download" onclick="download('1080', 'webm')">1080p | webm</button>
          </div>

        </div>
      </div>
    </section>
    <section>
      <div class="container logs">
        <div class="logs-heading">logs</div>
        <div class="log">
          welcome to the app
        </div>
        <div class="downloads_status"></div>
        <div class="progress"></div>
      </div>
    </section>
  </main>

  <footer>
    <p>Made By Gheshman Shakeel</p>
